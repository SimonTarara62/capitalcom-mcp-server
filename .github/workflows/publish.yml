name: Publish to PyPI

# Publishes capitalcom-mcp to PyPI when a GitHub Release is published.
# Uses PyPI Trusted Publishing (OIDC) — no API tokens are stored in the repo.
#
# One-time PyPI setup (https://pypi.org/manage/account/publishing/):
#   PyPI Project Name : capitalcom-mcp
#   Owner             : SimonTarara62
#   Repository name   : capitalcom-mcp-server
#   Workflow name     : publish.yml
#   Environment name  : pypi
# Then cut a GitHub Release (tag e.g. v0.2.0) to trigger this workflow.

on:
  release:
    types: [published]
  workflow_dispatch:   # allow a manual run after the trusted publisher is set up

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Validate metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/capitalcom-mcp
    permissions:
      id-token: write   # OIDC token for Trusted Publishing
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-mcp-registry:
    name: Publish to MCP Registry
    needs: publish
    runs-on: ubuntu-latest
    # Only on a real Release (tag present). A bare workflow_dispatch has no tag,
    # which would otherwise write a branch name as the version.
    if: github.event_name == 'release'
    permissions:
      id-token: write   # OIDC for mcp-publisher login github-oidc
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
      - name: Sync server.json version to the release tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python3 -c "import json,sys; p='server.json'; d=json.load(open(p)); d['version']=sys.argv[1]; d['packages'][0]['version']=sys.argv[1]; json.dump(d,open(p,'w'),indent=2)" "$VERSION"
          echo "server.json now at version $VERSION"
      - name: Wait for PyPI to expose the new version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for i in $(seq 1 30); do
            if curl -fsSL "https://pypi.org/pypi/capitalcom-mcp/$VERSION/json" >/dev/null; then
              echo "capitalcom-mcp $VERSION is on PyPI"; exit 0
            fi
            echo "waiting for PyPI ($i)…"; sleep 10
          done
          echo "PyPI did not expose $VERSION in time" >&2; exit 1
      - name: Authenticate to the MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc
      - name: Publish to the MCP Registry
        run: ./mcp-publisher publish
