name: Publish to PyPI

# Publishes capitalcom-mcp to PyPI when a GitHub Release is published.
# Uses PyPI Trusted Publishing (OIDC) — no API tokens are stored in the repo.
#
# One-time PyPI setup (https://pypi.org/manage/account/publishing/):
#   PyPI Project Name : capitalcom-mcp
#   Owner             : SimonTarara62
#   Repository name   : capitalcom-mcp-server
#   Workflow name     : publish.yml
#   Environment name  : pypi
# Then cut a GitHub Release (tag e.g. v0.2.0) to trigger this workflow.

on:
  release:
    types: [published]
  workflow_dispatch:   # allow a manual run after the trusted publisher is set up

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Validate metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/capitalcom-mcp
    permissions:
      id-token: write   # OIDC token for Trusted Publishing
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
