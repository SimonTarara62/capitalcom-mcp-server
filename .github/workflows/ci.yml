name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:   # allow manually triggering the e2e job

jobs:
  test:
    name: lint + types + offline tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (uses the published capitalcom-cli SDK)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check capital_mcp tests
      - name: Type-check
        run: mypy capital_mcp
      - name: Offline tests
        run: pytest -q          # excludes e2e via the -m "not e2e" default

  e2e:
    name: full demo e2e via MCP (all tools)
    needs: test
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Write demo .env from secrets (trading + streaming ON — DEMO only)
        env:
          CAP_API_KEY: ${{ secrets.CAP_API_KEY }}
          CAP_IDENTIFIER: ${{ secrets.CAP_IDENTIFIER }}
          CAP_API_PASSWORD: ${{ secrets.CAP_API_PASSWORD }}
        run: |
          if [ -z "$CAP_API_KEY" ]; then echo "no demo secrets configured; skipping e2e"; exit 0; fi
          printf 'CAP_ENV=demo\nCAP_API_KEY=%s\nCAP_IDENTIFIER=%s\nCAP_API_PASSWORD=%s\nCAP_ALLOW_TRADING=true\nCAP_ALLOWED_EPICS=BTCUSD,GOLD\nCAP_WS_ENABLED=true\n' \
            "$CAP_API_KEY" "$CAP_IDENTIFIER" "$CAP_API_PASSWORD" > .env
      - name: Full e2e via MCP (every tool, incl. executions)
        run: |
          if [ ! -f .env ]; then echo "no .env; skipping e2e"; exit 0; fi
          CAP_MCP_E2E=1 pytest tests/e2e -m e2e -v
