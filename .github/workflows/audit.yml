name: Dependency audit

# Non-blocking supply-chain scan of the resolved dependency tree.
# It surfaces known advisories (including transitive deps) but never gates a
# release or a PR: the job is marked continue-on-error.
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 7 * * 1"   # weekly Mon 07:00 UTC, just after the CI canary
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pip-audit:
    name: pip-audit (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install the package + pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install . pip-audit
      - name: Audit the resolved dependency tree
        run: pip-audit --progress-spinner off
